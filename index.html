<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Save Our Wildlife</h1>
  </header>

  <main>
    <video id="wildlife-video" controls aria-label="Wildlife promotional video">
      <source src="wildlife.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <p>
      Every species matters. Join Jesses mission to protect endangered wildlife and
      preserve natural habitats for generations to come.
    </p>

    <button id="toggle-btn" aria-controls="wildlife-video">Hide Video</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
